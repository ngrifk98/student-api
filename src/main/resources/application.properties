# ============================================================
# Student API - Application Properties
# ============================================================

# Application name (shows in /actuator/info)
spring.application.name=student-api

# Server port (default is 8080)
server.port=8080

# ---- H2 In-Memory Database Configuration ----
# H2 console accessible at: http://localhost:8080/h2-console
spring.datasource.url=jdbc:h2:mem:studentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate Configuration ----
# create-drop: creates schema on startup, drops on shutdown (good for dev)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# ---- Actuator Configuration ----
# Expose all actuator endpoints (for demo purposes)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
